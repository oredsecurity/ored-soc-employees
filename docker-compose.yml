# ORED AI SOC Employees — MCP Server
# https://github.com/oredsecurity/ored-soc-employees
#
# Runs the hardened Wazuh MCP server. Hermes agent runs natively
# on the host using profiles for tenant isolation.
#
# Quick start:
#   cp .env.example .env    # fill in Wazuh credentials
#   docker compose up -d
#
# Multi-tenant: use scripts/provision-tenant.sh instead.
# It generates a per-tenant compose with isolated ports and config.

services:
  wazuh-mcp:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    container_name: ored-wazuh-mcp
    restart: unless-stopped
    ports:
      - "${MCP_PORT:-3000}:3000"
    env_file: .env
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
